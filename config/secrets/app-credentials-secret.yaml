# Application Configuration Secrets
apiVersion: v1
kind: Secret
metadata:
  name: app-config
  namespace: production
type: Opaque
stringData:
  app_api_key: "YOUR_APP_API_KEY"
  app_secret: "YOUR_APP_SECRET"
  encryption_key: "YOUR_ENCRYPTION_KEY"
  jwt_secret: "YOUR_JWT_SECRET"
---
# LDAP/Active Directory Credentials
apiVersion: v1
kind: Secret
metadata:
  name: ldap-credentials
  namespace: production
type: Opaque
stringData:
  ldap_bind_dn: "CN=migration-user,CN=Users,DC=example,DC=com"
  ldap_bind_password: "YOUR_LDAP_PASSWORD"
  ldap_server: "ldap://ldap.example.com:389"
  ldap_base_dn: "DC=example,DC=com"
---
# API Keys and Tokens
apiVersion: v1
kind: Secret
metadata:
  name: api-keys
  namespace: production
type: Opaque
stringData:
  # Storage API Keys
  aws_access_key: "YOUR_AWS_ACCESS_KEY"
  aws_secret_key: "YOUR_AWS_SECRET_KEY"
  
  # Monitoring API Keys
  monitoring_api_key: "YOUR_MONITORING_API_KEY"
  
  # Backup API Keys
  backup_api_key: "YOUR_BACKUP_API_KEY"
---
# SSH Keys for VM Access
apiVersion: v1
kind: Secret
metadata:
  name: ssh-keys
  namespace: production
type: Opaque
stringData:
  # SSH private key for VM access
  ssh_private_key: |
    -----BEGIN RSA PRIVATE KEY-----
    YOUR_SSH_PRIVATE_KEY_CONTENT
    -----END RSA PRIVATE KEY-----
  # SSH public key
  ssh_public_key: "YOUR_SSH_PUBLIC_KEY"