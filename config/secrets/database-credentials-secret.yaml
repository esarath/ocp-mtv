# MySQL/MariaDB Database Credentials
apiVersion: v1
kind: Secret
metadata:
  name: mysql-credentials
  namespace: production
type: Opaque
stringData:
  username: "root"
  password: "YOUR_MYSQL_PASSWORD"
  database: "app_database"
  host: "mysql-server.example.com"
  port: "3306"
---
# PostgreSQL Database Credentials
apiVersion: v1
kind: Secret
metadata:
  name: postgresql-credentials
  namespace: production
type: Opaque
stringData:
  username: "postgres"
  password: "YOUR_POSTGRESQL_PASSWORD"
  database: "app_database"
  host: "postgresql-server.example.com"
  port: "5432"
---
# SQL Server Database Credentials
apiVersion: v1
kind: Secret
metadata:
  name: sqlserver-credentials
  namespace: production
type: Opaque
stringData:
  username: "sa"
  password: "YOUR_SQLSERVER_PASSWORD"
  database: "app_database"
  host: "sqlserver.example.com"
  port: "1433"
---
# Oracle Database Credentials
apiVersion: v1
kind: Secret
metadata:
  name: oracle-credentials
  namespace: production
type: Opaque
stringData:
  username: "system"
  password: "YOUR_ORACLE_PASSWORD"
  database: "ORCL"
  host: "oracle-server.example.com"
  port: "1521"