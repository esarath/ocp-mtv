apiVersion: v1
kind: Secret
metadata:
  name: vcenter-credentials
  namespace: openshift-mtv
type: Opaque
stringData:
  username: "migration-user@vsphere.local"
  password: "YOUR_VCENTER_PASSWORD"
  vcenter_host: "vcenter.example.com"
  vcenter_port: "443"
  insecure_skip_verify: "true"
  datacenter: "Datacenter-Name"
---
