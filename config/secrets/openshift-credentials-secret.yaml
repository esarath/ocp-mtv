apiVersion: v1
kind: Secret
metadata:
  name: openshift-credentials
  namespace: openshift-mtv
type: Opaque
stringData:
  username: "kubeadmin"
  password: "YOUR_OPENSHIFT_PASSWORD"
  api_url: "https://api.openshift.example.com:6443"
  cluster_name: "openshift-cluster"
  token: "YOUR_OPENSHIFT_TOKEN"
---
# Service account token for MTV
apiVersion: v1
kind: Secret
metadata:
  name: mtv-service-account
  namespace: openshift-mtv
  annotations:
    kubernetes.io/service-account.name: "mtv-sa"
type: kubernetes.io/service-account-token
---
# Service account secret for MTV
apiVersion: v1
kind: Secret
metadata:
  name: mtv-service-account-secret
  namespace: openshift-mtv
type: Opaque
stringData:
  service_account_name: "mtv-sa"
  service_account_namespace: "openshift-mtv"
  cluster_role: "cluster-admin"
  # Add any additional service account secrets