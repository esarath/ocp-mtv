apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: app-server-01-disk
  namespace: production
  annotations:
    mtv.konveyor.io/source-vm: "app-server-01"
    mtv.konveyor.io/source-disk: "disk-1"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: storage-class-hdd
  resources:
    requests:
      storage: 75Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: app-server-01-shared-disk
  namespace: production
  annotations:
    mtv.konveyor.io/source-vm: "app-server-01"
    mtv.konveyor.io/source-disk: "disk-2"
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: storage-class-nfs
  resources:
    requests:
      storage: 200Gi