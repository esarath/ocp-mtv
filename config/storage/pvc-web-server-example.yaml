apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: web-server-01-disk
  namespace: production
  annotations:
    mtv.konveyor.io/source-vm: "web-server-01"
    mtv.konveyor.io/source-disk: "disk-1"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: storage-class-hdd
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: web-server-01-data-disk
  namespace: production
  annotations:
    mtv.konveyor.io/source-vm: "web-server-01"
    mtv.konveyor.io/source-disk: "disk-2"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: storage-class-hdd
  resources:
    requests:
      storage: 100Gi