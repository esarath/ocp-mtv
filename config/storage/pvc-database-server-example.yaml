apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: database-server-01-disk
  namespace: production
  annotations:
    mtv.konveyor.io/source-vm: "database-server-01"
    mtv.konveyor.io/source-disk: "disk-1"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: storage-class-ssd
  resources:
    requests:
      storage: 100Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: database-server-01-data-disk
  namespace: production
  annotations:
    mtv.konveyor.io/source-vm: "database-server-01"
    mtv.konveyor.io/source-disk: "disk-2"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: storage-class-ssd
  resources:
    requests:
      storage: 500Gi