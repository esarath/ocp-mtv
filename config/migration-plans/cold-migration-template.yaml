apiVersion: fork.konveyor.io/v1beta1
kind: MigrationPlan
metadata:
  name: cold-migration-template
  namespace: openshift-mtv
  labels:
    app: mtv
    migration-type: cold
  annotations:
    description: "Cold migration template - customize before use"
spec:
  provider_sources:
    - name: vsphere-provider
      namespace: openshift-mtv
  provider_destinations:
    - name: openshift-provider
      namespace: openshift-mtv
  migrations:
    - vm:
        id: "vm-12345"  # Replace with actual VM ID from vCenter
        name: "source-vm-name"  # Replace with actual VM name
        category: "web-server"  # Optional: for categorization
      target_namespace: "production"  # Replace with target namespace
      target_vm_name: "target-vm-name"  # Replace with target VM name
      network_mappings:
        - source: "VM Network"  # Source network in vCenter
          destination: "vlan-10-production"  # Destination network in OpenShift
      storage_mappings:
        - source: "datastore-ssd"  # Source datastore in vCenter
          destination: "storage-class-ssd"  # Destination storage class in OpenShift
  warm_migration: false