apiVersion: fork.konveyor.io/v1beta1
kind: MigrationPlan
metadata:
  name: web-server-01-warm-migration
  namespace: openshift-mtv
  labels:
    app: mtv
    migration-type: warm
    vm-category: web-server
  annotations:
    description: "Warm migration for web server VM"
    vm-source: "web-server-01"
    vm-target: "web-server-01"
spec:
  provider_sources:
    - name: vsphere-provider
      namespace: openshift-mtv
  provider_destinations:
    - name: openshift-provider
      namespace: openshift-mtv
  migrations:
    - vm:
        id: "vm-12345"
        name: "web-server-01"
        category: "web-server"
      target_namespace: "production"
      target_vm_name: "web-server-01"
      network_mappings:
        - source: "VM Network"
          destination: "vlan-10-production"
      storage_mappings:
        - source: "datastore-ssd"
          destination: "storage-class-hdd"
  warm_migration: true
  warm_migration_settings:
    cutover_seconds: 300  # 5 minutes for cutover window
    sync_interval_seconds: 600  # 10 minutes for sync interval