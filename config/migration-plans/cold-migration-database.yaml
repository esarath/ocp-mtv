apiVersion: fork.konveyor.io/v1beta1
kind: MigrationPlan
metadata:
  name: database-server-01-cold-migration
  namespace: openshift-mtv
  labels:
    app: mtv
    migration-type: cold
    vm-category: database
  annotations:
    description: "Cold migration for database server VM"
    vm-source: "database-server-01"
    vm-target: "database-server-01"
spec:
  provider_sources:
    - name: vsphere-provider
      namespace: openshift-mtv
  provider_destinations:
    - name: openshift-provider
      namespace: openshift-mtv
  migrations:
    - vm:
        id: "vm-67890"
        name: "database-server-01"
        category: "database"
      target_namespace: "production"
      target_vm_name: "database-server-01"
      network_mappings:
        - source: "VM Network"
          destination: "vlan-10-production"
      storage_mappings:
        - source: "datastore-ssd"
          destination: "storage-class-ssd"
  warm_migration: false