apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: bridge-physical
  namespace: openshift-mtv
  annotations:
    k8s.v1.cni.cncf.io/resourceName: bridge.network.kubevirt.io/br-ex
spec:
  config: '{
    "cniVersion": "0.3.1",
    "name": "bridge-physical",
    "type": "bridge",
    "bridge": "br-ex",
    "ipam": {
      "type": "dhcp"
    },
    "mtu": 1500,
    "isGateway": false,
    "hairpinMode": false,
    "promiscMode": false
  }'
