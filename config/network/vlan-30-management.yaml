apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: vlan-30-management
  namespace: openshift-mtv
  annotations:
    k8s.v1.cni.cncf.io/resourceName: bridge.network.kubevirt.io/br-ex
spec:
  config: '{
    "cniVersion": "0.3.1",
    "name": "vlan-30-management",
    "type": "bridge",
    "bridge": "br-ex",
    "vlan": 30,
    "ipam": {
      "type": "host-local",
      "subnet": "192.168.30.0/24",
      "rangeStart": "192.168.30.100",
      "rangeEnd": "192.168.30.200",
      "gateway": "192.168.30.1",
      "routes": [
        {
          "dst": "0.0.0.0/0"
        }
      ]
    },
    "mtu": 1500,
    "isGateway": false,
    "hairpinMode": false,
    "promiscMode": false
  }'
